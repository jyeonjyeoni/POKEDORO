<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#315342" />
    <meta name="description" content="집중하면 포켓몬 세계를 탐험하는 뽀모도로 웹앱" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./assets/pokedoro.ico" />
    <title>POKEDORO</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>if('serviceWorker' in navigator){let refreshing=false;navigator.serviceWorker.addEventListener('controllerchange',()=>{if(!refreshing){refreshing=true;location.reload()}});addEventListener('load',()=>navigator.serviceWorker.register('./sw.js',{updateViaCache:'none'}).then(registration=>registration.update()))}</script>
  </body>
</html>
